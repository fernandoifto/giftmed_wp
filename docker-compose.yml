services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wordpress
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  wordpress:
    image: wordpress:6.8-php8.2-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WORDPRESS_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-0}
      WP_HOME: ${WP_HOME:-http://localhost:8080}
      WP_SITEURL: ${WP_SITEURL:-http://localhost:8080}
      GIFTMED_SEED_NOTICIAS: ${GIFTMED_SEED_NOTICIAS:-0}
      WORDPRESS_AUTH_KEY: ${WORDPRESS_AUTH_KEY:-}
      WORDPRESS_SECURE_AUTH_KEY: ${WORDPRESS_SECURE_AUTH_KEY:-}
      WORDPRESS_LOGGED_IN_KEY: ${WORDPRESS_LOGGED_IN_KEY:-}
      WORDPRESS_NONCE_KEY: ${WORDPRESS_NONCE_KEY:-}
      WORDPRESS_AUTH_SALT: ${WORDPRESS_AUTH_SALT:-}
      WORDPRESS_SECURE_AUTH_SALT: ${WORDPRESS_SECURE_AUTH_SALT:-}
      WORDPRESS_LOGGED_IN_SALT: ${WORDPRESS_LOGGED_IN_SALT:-}
      WORDPRESS_NONCE_SALT: ${WORDPRESS_NONCE_SALT:-}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', ${WORDPRESS_DEBUG:-0});
        define('WP_DEBUG_LOG', ${WORDPRESS_DEBUG:-0});
        define('WP_DEBUG_DISPLAY', false);
        define('DISALLOW_FILE_EDIT', true);
        if (getenv('WP_HOME')) {
            define('WP_HOME', getenv('WP_HOME'));
        }
        if (getenv('WP_SITEURL')) {
            define('WP_SITEURL', getenv('WP_SITEURL'));
        }
    volumes:
      - wp_data:/var/www/html
      - ./wp-content:/var/www/html/wp-content
      - ./giftmedtema:/var/www/html/wp-content/themes/giftmedtema
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    networks:
      - wordpress

volumes:
  db_data:
  wp_data:

networks:
  wordpress:
    driver: bridge
